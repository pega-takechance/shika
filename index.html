<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1b4332">
    <title>ニホンジカ糞塊密度調査アプリ</title>
    <meta name="description" content="ニホンジカ糞塊密度調査の入力、保存、集計を行う完全オフライン対応アプリです。">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Apple Touch Icon for PWA -->
    <link rel="apple-touch-icon" href="icon.jpg">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M9 12l2 2 4-4"/></svg>
                <h1>DeerSurvey <span>Pro</span></h1>
            </div>
            <button id="btn-back-home" class="btn-icon hidden" aria-label="ホームに戻る">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
        </header>

        <!-- MAIN CONTAINER -->
        <main class="app-content">

            <!-- HOME SCREEN -->
            <section id="screen-home" class="screen active">
                <div class="hero-section">
                    <h2>調査を開始する</h2>
                    <p>電波の届かない場所でも完全に動作します。</p>
                </div>
                
                <div class="job-settings-section" style="margin-bottom: 24px;">
                    <div class="form-section" style="margin-bottom: 0;">
                        <h3 class="section-title">調査業務の設定</h3>
                        <div class="input-group">
                            <label for="home-job-select">登録済みの業務名から選択</label>
                            <select id="home-job-select">
                                <option value="">選択してください</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="home-job-input">新しい業務名を登録</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="home-job-input" placeholder="例: 令和5年度〇〇調査">
                                <button type="button" id="btn-add-job" class="btn-secondary" style="white-space: nowrap;">登録</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="menu-grid">
                    <button class="menu-card primary" data-target="screen-survey">
                        <div class="card-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </div>
                        <h3>新規調査入力</h3>
                        <p>新しいフィールド調査を開始します</p>
                    </button>

                    <button class="menu-card" data-target="screen-analysis">
                        <div class="card-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        </div>
                        <h3>メッシュ別分析</h3>
                        <p>入力済みデータの集計・分析</p>
                    </button>

                    <button class="menu-card" data-target="screen-logs">
                        <div class="card-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        </div>
                        <h3>過去ログ・管理</h3>
                        <p>保存されたデータの閲覧と削除</p>
                    </button>
                </div>

                <div class="install-prompt hidden" id="install-prompt">
                    <div class="prompt-text">
                        <strong>アプリをインストール</strong>
                        <span>ホーム画面に追加してフルスクリーンで利用できます</span>
                    </div>
                    <button id="btn-install" class="btn-small">追加</button>
                </div>
            </section>

            <!-- SURVEY FORM SCREEN -->
            <section id="screen-survey" class="screen">
                <form id="survey-form">
                    <div class="form-section">
                        <h3 class="section-title">調査基本情報</h3>
                        <div class="input-group">
                            <label for="survey-date">日付</label>
                            <input type="date" id="survey-date" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="survey-start-time">開始時間</label>
                                <input type="time" id="survey-start-time">
                            </div>
                            <div class="input-group">
                                <label for="survey-end-time">終了時間</label>
                                <input type="time" id="survey-end-time">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="survey-weather">天候</label>
                            <select id="survey-weather">
                                <option value="晴れ">晴れ</option>
                                <option value="曇り">曇り</option>
                                <option value="雨">雨</option>
                                <option value="雪">雪</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="project-name">業務名</label>
                            <input type="text" id="project-name" placeholder="スタート画面で設定してください" readonly style="background-color: var(--bg-main); color: var(--text-muted); pointer-events: none;">
                        </div>
                        <div class="input-group">
                            <label for="surveyor-name">調査者</label>
                            <input type="text" id="surveyor-name" placeholder="氏名">
                        </div>
                        <div class="input-group">
                            <label for="mesh-no">メッシュNO</label>
                            <input type="text" id="mesh-no" placeholder="例: 5339-12">
                        </div>
                        <div class="input-group">
                            <label>調査不能箇所</label>
                            <div class="checkbox-grid">
                                <label class="checkbox-label"><input type="radio" name="cannot-survey" value="有"> 有</label>
                                <label class="checkbox-label"><input type="radio" name="cannot-survey" value="無" checked> 無</label>
                            </div>
                        </div>
                    </div>

                    <!-- AREA LIST CONTAINER -->
                    <div id="areas-container">
                        <!-- Area Templates will be injected here via JS -->
                    </div>

                    <button type="button" id="btn-add-area" class="btn-outline">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        区域を追加する
                    </button>

                    <div class="form-actions bottom-bar">
                        <button type="submit" class="btn-primary btn-large" style="margin-bottom: 12px;">データを保存する（完了）</button>
                        <div style="display: flex; gap: 12px;">
                            <button type="button" id="btn-suspend-survey" class="btn-secondary" style="flex: 1;">一時保存して中断</button>
                            <button type="button" id="btn-cancel-survey" class="btn-danger" style="flex: 1;">保存せずに終了</button>
                        </div>
                    </div>
                </form>
            </section>

            <!-- ANALYSIS SCREEN -->
            <section id="screen-analysis" class="screen">
                <div class="page-header">
                    <h2>メッシュ別 集計・分析</h2>
                </div>
                <!-- Controls -->
                <div class="filter-controls">
                    <div class="input-group">
                        <label for="analysis-mesh-select">メッシュを選択</label>
                        <select id="analysis-mesh-select">
                            <option value="">すべてのメッシュ</option>
                        </select>
                    </div>
                </div>

                <div class="dashboard-cards">
                    <div class="stat-card">
                        <span class="stat-label">総区域数</span>
                        <strong class="stat-value" id="stat-total-areas">0</strong>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">シカ目撃数合計</span>
                        <strong class="stat-value" id="stat-total-deer">0</strong>
                    </div>
                    <div class="stat-card full-width">
                        <span class="stat-label">糞塊 10粒以上 (新・中・旧 合計)</span>
                        <strong class="stat-value highlight" id="stat-total-pellets-high">0</strong>
                    </div>
                </div>

                <div id="analysis-results" class="analysis-table-container">
                    <!-- Table injected by JS -->
                </div>
            </section>

            <!-- LOGS SCREEN -->
            <section id="screen-logs" class="screen">
                <div class="page-header">
                    <h2>過去ログ閲覧・管理</h2>
                    <button id="btn-export" class="btn-secondary btn-small">
                        CSVエクスポート
                    </button>
                </div>
                
                <div class="logs-actions">
                    <button id="btn-delete-selected" class="btn-danger" disabled>選択したデータを消去</button>
                </div>

                <div class="logs-list-container">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="checkbox-all"></th>
                                <th>日付</th>
                                <th>業務名</th>
                                <th>メッシュNO</th>
                                <th>詳細</th>
                            </tr>
                        </thead>
                        <tbody id="logs-tbody">
                            <!-- Logs injected by JS -->
                        </tbody>
                    </table>
                    <div class="empty-state" id="logs-empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                        <p>保存されたデータはありません。</p>
                    </div>
                </div>
            </section>

        </main>
        
        <!-- Toast Notification -->
        <div id="toast" class="toast">保存されました</div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
